server {
    listen 80;
    server_name _;

    # Статика собранного React-приложения
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие: без него JS-бандл (~176 КБ) едет целиком. С gzip — ~55 КБ,
    # заметно быстрее открывается, особенно внутри Telegram на телефоне.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Хэшированные ассеты Vite можно кэшировать надолго — имя меняется при сборке.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Проксируем API на бэкенд (имя сервиса из docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        # По умолчанию nginx режет тело запроса на 1 МБ — не хватит для фото.
        client_max_body_size 8m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA-роутинг: любые пути отдаём на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
