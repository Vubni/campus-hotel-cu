server {
    listen 80;
    server_name _;

    # Статика собранного React-приложения
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие: без него JS-бандл (~176 КБ) едет целиком. С gzip — ~55 КБ,
    # заметно быстрее открывается, особенно внутри Telegram на телефоне.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Хэшированные ассеты Vite можно кэшировать надолго — имя меняется при сборке.
    # try_files ... =404 обязателен: без него промах уходил в SPA-fallback ниже
    # и опечатка в пути ассета возвращала HTML с кодом 200. Браузер честно
    # пытался исполнить страницу как JavaScript, а в логах всё выглядело
    # успешным — такие вещи потом ищутся часами.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Служебные файлы, которых у нас нет. Без этого SPA-fallback отдавал на них
    # index.html с кодом 200: поисковые боты получали приложение вместо
    # robots.txt, а 404 в принципе не существовало.
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }
    location = /sitemap.xml {
        try_files $uri =404;
    }

    # index.html кэшировать нельзя. Он ссылается на бандл с хэшем в имени, а
    # пересборка этот хэш меняет и старый файл удаляет. Без заголовка браузер
    # включает эвристику и часами держит вчерашнюю копию — она просит
    # /assets/index-СТАРЫЙ.js, ловит 404 и рисует белый экран. Именно поэтому
    # после деплоя «у всех сломалось, а у меня работает»: сам-то деплоящий
    # открывает с обновлением кэша.
    #
    # no-cache — это не «не кэшируй», а «кэшируй, но перед выдачей переспроси».
    # Файл не менялся — nginx ответит 304 по ETag, это дешевле полной загрузки.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Своя копия Telegram SDK. Хэша в имени нет, значит вечно кэшировать нельзя:
    # обновим файл руками — а у людей останется старый. Тот же no-cache, что и у
    # index.html: обычно это дешёвый 304.
    location = /telegram-web-app.js {
        add_header Cache-Control "no-cache";
    }

    # Загруженные фото. Имя файла — uuid, содержимое по нему никогда не
    # меняется, поэтому кэшируем надолго и без ревалидации. Раньше заголовка
    # не было вовсе: бэкенд отдавал только ETag, браузер на каждом заходе
    # переспрашивал все 15 картинок экрана, а на мобильной сети половина
    # запросов отваливалась по таймауту, не дождавшись ответа.
    location /api/media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        # Картинки уже сжаты — второй проход только тратит процессор.
        gzip off;
        access_log off;
    }

    # Проксируем API на бэкенд (имя сервиса из docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        # По умолчанию nginx режет тело запроса на 1 МБ — не хватит для фото.
        client_max_body_size 8m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Тело запроса nginx буферизует у себя и отдаёт бэкенду целиком. Это
        # важно для фото с телефона: медленный мобильный канал держит соединение
        # с nginx, а не воркер приложения.
        proxy_request_buffering on;
        client_body_buffer_size 256k;

        # Телефон в метро может «замолчать» на минуты. Раньше такие соединения
        # висели до упора — в логах встречались загрузки по 17 минут, которые
        # всё равно заканчивались ничем. Рвём заметно раньше.
        client_body_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA-роутинг: любые пути отдаём на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
