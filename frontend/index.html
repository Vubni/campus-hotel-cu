<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Кампус-отели Диск и Облако — поиск соседей по комнате</title>
    <!-- SDK Telegram Mini App. Вне Telegram скрипт просто ничего не делает:
         window.Telegram.WebApp.initData останется пустым.

         Отдаём СВОЮ копию (public/telegram-web-app.js), а не telegram.org.
         Раньше скрипт грузился с telegram.org, и это ломало приложение там, где
         домен недоступен: у части провайдеров и VPN он не резолвится, а сам
         Telegram при этом работает — у него свой канал до серверов. Мини-апп
         открывался, скрипт висел, и из-за defer (он сохраняет порядок с модулем
         main.jsx) приложение не стартовало вовсе — пустой экран.

         Просто заменить defer на async было нельзя: useMyProfile при первом
         рендере зовёт isInsideTelegram(), и не успей SDK загрузиться, человек
         внутри Telegram молча превращался бы в анонима из обычного браузера.
         Своя копия снимает вопрос целиком — порядок сохранён, сети не нужно.

         Версия зафиксирована на момент скачивания (июль 2026). Обновлять руками:
           curl -o frontend/public/telegram-web-app.js \
                https://telegram.org/js/telegram-web-app.js
         Смысл есть, когда понадобятся возможности новых версий Bot API. -->
    <script defer src="/telegram-web-app.js"></script>
    <script>
      // Применяем тему до отрисовки, чтобы не было вспышки светлого экрана.
      (function () {
        try {
          var mode = localStorage.getItem("obshaga_theme") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
