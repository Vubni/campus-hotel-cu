<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кампус-отель Диск — поиск соседей по комнате</title>
    <!-- SDK Telegram Mini App. Вне Telegram скрипт просто ничего не делает:
         window.Telegram.WebApp.initData останется пустым. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Применяем тему до отрисовки, чтобы не было вспышки светлого экрана.
      (function () {
        try {
          var mode = localStorage.getItem("obshaga_theme") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
